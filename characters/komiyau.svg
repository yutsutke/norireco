<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <title>八王子市小宮：アユと列車の妖精「コミヤウ」</title>

  <!-- 水しぶき・軌跡（多摩川の流れ） -->
  <path d="M12.5 48.5c-4 0-6-2-6-4s2-4 6-4" stroke="#81D4FA" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M8.5 54.5c-3 0-5-1.5-5-3s2-3 5-3" stroke="#4FC3F7" stroke-width="2" stroke-linecap="round"/>

  <!-- 尾びれ（列車の連結部・排障器のイメージ） -->
  <path d="M14.5 32.5l-6-8c-2-2-4-1-4 2v12c0 3 2 4 4 2l6-8z" fill="#FFB300"/>
  <path d="M14.5 32.5l-6 8c-2 2-4 1-4-2v-12c0-3 2-4 4-2l6 8z" fill="#FFA000"/>
  <path d="M10.5 28.5v8" stroke="#212121" stroke-width="1.5" stroke-linecap="round"/>

  <!-- 背びれ（パンタグラフや屋根のイメージ） -->
  <path d="M30.5 16.5c2-4 6-4 8 0l2 6h-12l2-6z" fill="#0288D1"/>

  <!-- ボディ（アユ×列車） -->
  <path d="M12.5 32.5c0-12 10-16 24-16s22 6 22 16-8 16-22 16-24-4-24-16z" fill="#29B6F6"/>
  <path d="M12.5 32.5c0 8 10 16 24 16s22-6 22-16c0-2-1-4-2-6-8 6-20 8-32 8s-10-1-12-2z" fill="#E1F5FE"/>

  <!-- 列車の窓（乗客・景色） -->
  <rect x="24.5" y="28.5" width="6" height="6" rx="1.5" fill="#FFFFFF" stroke="#0288D1" stroke-width="1.5"/>
  <rect x="34.5" y="28.5" width="6" height="6" rx="1.5" fill="#FFFFFF" stroke="#0288D1" stroke-width="1.5"/>
  <rect x="44.5" y="28.5" width="6" height="6" rx="1.5" fill="#FFFFFF" stroke="#0288D1" stroke-width="1.5"/>

  <!-- 顔（運転席とアユの表情） -->
  <path d="M56.5 30.5c0-3-2-6-6-6h-4v10h8c1 0 2-2 2-4z" fill="#212121"/>
  <circle cx="52.5" cy="28.5" r="1.5" fill="#FFFFFF"/>

  <!-- アユの口・列車のライト -->
  <circle cx="58.5" cy="36.5" r="2" fill="#FFB300" stroke="#212121" stroke-width="1"/>
  <path d="M54.5 40.5c2 2 5 1 5-2" stroke="#212121" stroke-width="1.5" stroke-linecap="round"/>

  <!-- 側面のライン（八高線カラーのアクセント） -->
  <path d="M18.5 24.5h20" stroke="#FF7043" stroke-width="2" stroke-linecap="round"/>
</svg>
