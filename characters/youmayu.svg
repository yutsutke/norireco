<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <title>八王子市：繭の精「ヨウマユ」</title>
  <!-- 繭のメインボディ：有機的な非対称の楕円 -->
  <path d="M32 8.5c-12.2 0-21 10.8-21 23.5s8.8 23.5 21 23.5 21-10.8 21-23.5S44.2 8.5 32 8.5z" fill="#2d0a31"/>

  <!-- 内部から漏れ出す光（妖艶な色味） -->
  <ellipse cx="32" cy="32" rx="16" ry="20" fill="#8b008b" opacity="0.6"/>

  <!-- 糸の重なりを表現する曲線パス -->
  <path d="M16.5 22.1c8.5-4.2 22.5-4.2 31 0" stroke="#ff00ff" stroke-width="0.5" stroke-linecap="round" opacity="0.4"/>
  <path d="M13.2 35c10 5.5 27.6 5.5 37.6 0" stroke="#ff00ff" stroke-width="0.5" stroke-linecap="round" opacity="0.3"/>

  <!-- 「表情」を司る中央のスリット（視線のような鋭さ） -->
  <path d="M22 31c5-2 15-2 20 0-5 3-15 3-20 0z" fill="#ff69b4"/>
  <circle cx="32" cy="31" r="1.5" fill="#ffffff" opacity="0.8"/>

  <!-- 繭の輪郭線：微細な歪み -->
  <path d="M32 9c11.6 0 20 10.3 20 23s-8.4 23-20 23-20-10.3-20-23S20.4 9 32 9z" stroke="#4b0082" stroke-width="1"/>
</svg>
