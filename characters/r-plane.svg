<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <title>立川：飛翔するアート彫刻「アール・プレーン 2.0」</title>
  <!-- ボディ：有機的な彫刻フォルム -->
  <path d="M12.5 38.5c0-10 8-16 22-16 12 0 16 6 18 12s-4 14-16 14c-10 0-24-4-24-10z" fill="#0033FF"/>

  <!-- 尾翼：力強く立ち上がる曲線 -->
  <path d="M46.5 28.5c2-10 6-16 11-16 1 4 0 10-2 16h-9z" fill="#0033FF"/>

  <!-- 上翼：ドット柄のモダンアート -->
  <path d="M8.5 22.5c0-4 12-6 24-6s24 2 24 6-12 6-24 6-24-2-24-6z" fill="#FFFFFF" stroke="#212121" stroke-width="1.2"/>
  <circle cx="16.5" cy="20.5" r="2.2" fill="#D32F2F"/>
  <circle cx="26.5" cy="23.5" r="1.8" fill="#FBC02D"/>
  <circle cx="36.5" cy="19.5" r="2.5" fill="#388E3C"/>
  <circle cx="48.5" cy="22.5" r="1.5" fill="#1976D2"/>

  <!-- 顔：生命を吹き込む瞳 -->
  <circle cx="21.5" cy="35.5" r="5.5" fill="#FFFFFF" stroke="#212121" stroke-width="0.8"/>
  <circle cx="21.5" cy="35.5" r="2.2" fill="#212121"/>
  <circle cx="22.5" cy="34.5" r="0.8" fill="#FFFFFF"/>

  <!-- プロペラ：太陽のような生命の象徴 -->
  <path d="M13.5 38.5c-4-8-12-4-12 0s8 8 12 0" fill="#EF6C00" stroke="#212121" stroke-width="0.8"/>
  <path d="M13.5 38.5c-4 8-12 4-12 0s8-8 12 0" fill="#FBC02D" stroke="#212121" stroke-width="0.8"/>
  <circle cx="13.5" cy="38.5" r="3.2" fill="#D32F2F" stroke="#212121" stroke-width="1"/>

  <!-- 下翼と足：歩き出しそうな躍動感 -->
  <path d="M16.5 48.5l-4 4c-1.5 1.5-1 4 1 4h4l3-8" fill="#D32F2F" stroke="#212121" stroke-width="1"/>
  <path d="M42.5 48.5l4 4c1.5 1.5 1 4-1 4h-4l-3-8" fill="#FBC02D" stroke="#212121" stroke-width="1"/>

  <!-- 全体を引き締めるライン -->
  <path d="M34.5 38.5c4 0 8 2 8 6" stroke="#FFFFFF" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
</svg>
