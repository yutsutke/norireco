<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>乗レコ - 乗りつぶしマップ</title>
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#E8352A">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="乗レコ">
<link rel="apple-touch-icon" href="./icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@300;400;700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<!-- Leaflet -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
:root{--navy:#0D1B2A;--steel:#1E3448;--track:#2E4A63;--track2:#243d55;--red:#E8352A;--gold:#F2A900;--green:#2ECC71;--silver:#8CA0B3;--white:#F4F7FA;}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;overflow:hidden;}
body{background:var(--navy);color:var(--white);font-family:'Zen Kaku Gothic New',sans-serif;}

.header{display:flex;align-items:center;gap:12px;padding:11px 16px;background:var(--steel);border-bottom:2px solid var(--red);position:fixed;top:0;left:0;right:0;z-index:100;height:52px;}
.logo{font-size:19px;font-weight:900;letter-spacing:-1px;}
.logo em{color:var(--red);font-style:normal;}
.logo small{font-size:10px;font-weight:300;color:var(--silver);letter-spacing:2px;display:block;margin-top:-2px;}
.header-stats{margin-left:auto;display:flex;gap:14px;align-items:center;}
.hstat{text-align:right;}
.hstat-val{font-family:'DM Mono',monospace;font-size:18px;font-weight:500;color:var(--red);line-height:1;}
.hstat-lbl{font-size:9px;color:var(--silver);letter-spacing:1px;text-transform:uppercase;}

.tabs{display:flex;background:var(--steel);border-bottom:1px solid var(--track);position:fixed;top:52px;left:0;right:0;z-index:99;height:40px;}
.tab{flex:1;padding:0;border:none;background:transparent;color:var(--silver);font-family:'Zen Kaku Gothic New',sans-serif;font-size:12px;cursor:pointer;border-bottom:3px solid transparent;transition:all .2s;}
.tab.active{color:var(--white);border-bottom-color:var(--red);}

.content{position:fixed;top:92px;left:0;right:0;bottom:0;}
.pane{display:none;width:100%;height:100%;overflow-y:auto;}
.pane.active{display:block;}

/* MAP PANE - Leaflet */
#pane-map{overflow:hidden;position:relative;}
#leaflet-map{width:100%;height:100%;}

/* Leafletのデフォルトスタイルを上書き */
.leaflet-container{background:#0a1520 !important;font-family:'Zen Kaku Gothic New',sans-serif;}
.leaflet-control-zoom{border:1px solid var(--track) !important;border-radius:10px !important;overflow:hidden;}
.leaflet-control-zoom a{
  background:rgba(30,52,72,.95) !important;color:var(--white) !important;
  border-bottom:1px solid var(--track) !important;
  width:36px !important;height:36px !important;line-height:36px !important;
  font-size:18px !important;
}
.leaflet-control-zoom a:hover{background:var(--track) !important;}
.leaflet-control-attribution{
  background:rgba(13,27,42,.8) !important;color:rgba(140,160,179,.6) !important;
  font-size:9px !important;backdrop-filter:blur(4px);
}
.leaflet-control-attribution a{color:rgba(140,160,179,.8) !important;}

/* Map overlay stats/legend */
.map-stats-box{
  position:absolute;top:8px;right:8px;z-index:1000;
  background:rgba(13,27,42,.92);border:1px solid var(--track);border-radius:12px;
  padding:10px 13px;font-family:'DM Mono',monospace;font-size:11px;
  backdrop-filter:blur(8px);min-width:120px;pointer-events:none;
}
.ms-row{display:flex;justify-content:space-between;gap:10px;margin-bottom:3px;}
.ms-row:last-child{margin-bottom:0;}
.ms-lbl{color:var(--silver);}
.ms-val{color:var(--white);font-weight:500;}

.map-legend-box{
  position:absolute;bottom:60px;left:8px;z-index:1000;
  background:rgba(13,27,42,.92);border:1px solid var(--track);border-radius:12px;
  padding:9px 12px;font-size:10px;color:var(--silver);
  backdrop-filter:blur(8px);pointer-events:none;
}
.leg-row{display:flex;align-items:center;gap:6px;margin-bottom:3px;}
.leg-row:last-child{margin-bottom:0;}
.leg-swatch{height:3px;width:20px;border-radius:2px;}

.memo-fab{
  position:absolute;bottom:60px;right:8px;z-index:1000;
  width:46px;height:46px;border-radius:50%;
  background:rgba(30,52,72,.95);border:1.5px solid var(--track);
  color:var(--white);font-size:20px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 16px rgba(0,0,0,.5);transition:all .2s;
}
.memo-fab.on{background:rgba(242,169,0,.2);border-color:var(--gold);color:var(--gold);}
.memo-fab:hover{transform:scale(1.08);}

/* Leaflet tooltip style */
.norireco-tooltip{
  background:rgba(4,12,24,.95) !important;border:1px solid var(--track) !important;
  border-radius:10px !important;padding:9px 12px !important;
  color:var(--white) !important;font-family:'Zen Kaku Gothic New',sans-serif !important;
  font-size:12px !important;box-shadow:0 8px 24px rgba(0,0,0,.6) !important;
  white-space:nowrap;pointer-events:none;
}
.norireco-tooltip::before{display:none !important;}

/* LIST & STATS */
.pane-inner{padding:14px 14px 40px;}
.sec-lbl{font-size:10px;letter-spacing:2px;color:var(--silver);text-transform:uppercase;margin:14px 0 8px;display:flex;align-items:center;gap:8px;}
.sec-lbl:first-child{margin-top:0;}
.sec-lbl::after{content:'';flex:1;height:1px;background:var(--track);}
.lcard{background:#111827;border:1.5px solid var(--track);border-radius:12px;padding:12px 13px;margin-bottom:8px;}
.lcard.partial{border-color:rgba(242,169,0,.3);}
.lcard.done{border-color:rgba(232,53,42,.3);}
.lc-h{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
.lc-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.lc-name{font-size:13px;font-weight:700;flex:1;}
.lc-reg{font-size:10px;color:var(--silver);}
.lc-pct{font-family:'DM Mono',monospace;font-size:12px;font-weight:500;}
.prog{background:var(--track2);border-radius:3px;height:4px;overflow:hidden;}
.prog-bar{height:100%;border-radius:3px;}
.lc-sub{font-size:10px;color:var(--silver);margin-top:4px;font-family:'DM Mono',monospace;}

.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
.scard{background:#111827;border:1.5px solid var(--track);border-radius:12px;padding:12px;}
.sc-l{font-size:9px;color:var(--silver);letter-spacing:1px;text-transform:uppercase;margin-bottom:3px;}
.sc-v{font-size:22px;font-weight:700;font-family:'DM Mono',monospace;}
.sc-u{font-size:10px;color:var(--silver);}
.sc-s{font-size:10px;color:var(--silver);margin-top:2px;}

.bc{background:#111827;border:1.5px solid var(--track);border-radius:12px;padding:12px;margin-bottom:10px;}
.bc-t{font-size:10px;color:var(--silver);letter-spacing:1px;text-transform:uppercase;margin-bottom:9px;}
.bc-r{display:flex;align-items:center;gap:6px;margin-bottom:6px;}
.bc-l{font-size:11px;width:110px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.bc-bg{flex:1;background:var(--track2);border-radius:3px;height:6px;overflow:hidden;}
.bc-fill{height:100%;border-radius:3px;}
.bc-n{font-family:'DM Mono',monospace;font-size:10px;color:var(--silver);width:30px;text-align:right;flex-shrink:0;}

.ach-list{display:flex;flex-direction:column;gap:7px;}
.ach{background:#111827;border:1.5px solid var(--track);border-radius:11px;padding:11px 12px;display:flex;align-items:center;gap:10px;}
.ach.on{border-color:rgba(242,169,0,.4);background:rgba(242,169,0,.05);}
.ach-ic{font-size:22px;flex-shrink:0;filter:grayscale(1) opacity(.3);}
.ach.on .ach-ic{filter:none;}
.ach-nm{font-size:13px;font-weight:700;}
.ach-ds{font-size:10px;color:var(--silver);margin-top:2px;}
.ach-bj{margin-left:auto;font-size:9px;color:var(--gold);font-family:'DM Mono',monospace;flex-shrink:0;}

/* MEMO MODAL */
.memo-modal{position:fixed;inset:0;z-index:200;display:none;align-items:flex-end;background:rgba(0,0,0,.6);backdrop-filter:blur(6px);}
.memo-modal.open{display:flex;}
.memo-sheet{background:#111827;border-radius:20px 20px 0 0;width:100%;max-height:88vh;overflow-y:auto;padding:18px 16px 40px;animation:su .3s cubic-bezier(.4,0,.2,1);}
@keyframes su{from{transform:translateY(100%)}to{transform:translateY(0)}}
.sh{width:36px;height:4px;background:var(--track);border-radius:2px;margin:0 auto 16px;}
.modal-title{font-size:16px;font-weight:700;margin-bottom:3px;}
.modal-sub{font-size:11px;color:var(--silver);margin-bottom:14px;font-family:'DM Mono',monospace;}
.fg{margin-bottom:11px;}
.fl{font-size:11px;color:var(--silver);margin-bottom:5px;}
.chip-row{display:flex;gap:5px;flex-wrap:wrap;}
.chip{padding:5px 11px;border:1.5px solid var(--track);border-radius:16px;background:var(--track2);color:var(--silver);font-size:12px;cursor:pointer;font-family:'Zen Kaku Gothic New',sans-serif;transition:all .2s;white-space:nowrap;}
.chip.active{border-color:var(--gold);background:rgba(242,169,0,.15);color:var(--gold);}
.chip.tag-on{border-color:var(--green);background:rgba(46,204,113,.12);color:var(--green);}
.mta{width:100%;height:78px;background:var(--track2);border:1.5px solid var(--track);border-radius:10px;color:var(--white);font-family:'Zen Kaku Gothic New',sans-serif;font-size:13px;padding:9px;resize:none;line-height:1.6;outline:none;}
.mta:focus,.pin{border-color:var(--gold);}
.pin{width:100%;background:var(--track2);border:1.5px solid var(--track);border-radius:10px;color:var(--white);font-family:'DM Mono',monospace;font-size:11px;padding:9px 12px;outline:none;}
.btn-gen{width:100%;padding:13px;border:none;border-radius:12px;background:var(--gold);color:var(--navy);font-family:'Zen Kaku Gothic New',sans-serif;font-size:15px;font-weight:700;cursor:pointer;margin-top:13px;}
.btn-cls{width:100%;padding:11px;border:1.5px solid var(--track);border-radius:12px;background:transparent;color:var(--silver);font-family:'Zen Kaku Gothic New',sans-serif;font-size:13px;cursor:pointer;margin-top:8px;}
.out-area{display:none;margin-top:9px;}
.out-hint{font-size:10px;color:var(--gold);margin-bottom:5px;letter-spacing:1px;}
.out-ta{width:100%;height:120px;background:#060f1a;border:1.5px solid rgba(242,169,0,.4);border-radius:10px;color:var(--gold);font-family:'DM Mono',monospace;font-size:10px;padding:9px;resize:none;line-height:1.6;-webkit-user-select:all;user-select:all;}
</style>
</head>
<body>
<div class="header">
  <div class="logo">乗<em>レコ</em><small>NORITSUBU MAP</small></div>
  <div class="header-stats">
    <div class="hstat"><div class="hstat-val" id="h-pct">0%</div><div class="hstat-lbl">達成率</div></div>
    <div class="hstat"><div class="hstat-val" id="h-ln">0</div><div class="hstat-lbl">路線</div></div>
  </div>
</div>
<div class="tabs">
  <button class="tab active" onclick="switchTab('map')">🗾 地図</button>
  <button class="tab" onclick="switchTab('list')">📋 路線一覧</button>
  <button class="tab" onclick="switchTab('stats')">📊 統計</button>
</div>
<div class="content">
  <div class="pane active" id="pane-map">
    <!-- Leaflet map -->
    <div id="leaflet-map"></div>
    <!-- Overlays -->
    <div class="map-stats-box">
      <div class="ms-row"><span class="ms-lbl">全体</span><span class="ms-val" id="ms-pct">0%</span></div>
      <div class="ms-row"><span class="ms-lbl">乗車路線</span><span class="ms-val" id="ms-ln">0路線</span></div>
      <div class="ms-row"><span class="ms-lbl">完乗</span><span class="ms-val" id="ms-dn">0路線</span></div>
      <div class="ms-row" id="storage-row" style="margin-top:4px;padding-top:4px;border-top:1px solid var(--track)">
        <span class="ms-lbl" style="font-size:9px" id="storage-lbl">📱 local</span>
        <span style="font-size:9px;color:var(--silver)" id="storage-count"></span>
      </div>
    </div>
    <div class="map-legend-box">
      <div style="font-size:9px;color:var(--silver);letter-spacing:1px;margin-bottom:7px;text-transform:uppercase">凡例</div>
      <div class="leg-row">
        <div style="width:22px;height:0;border-top:2.5px dashed rgba(200,220,255,.7);margin-top:1px"></div>
        <span>未乗車（点線）</span>
      </div>
      <div class="leg-row">
        <div class="leg-swatch" style="background:var(--red);box-shadow:0 0 6px var(--red)"></div>
        <span>乗車済み（グロー）</span>
      </div>
      <div id="legend-lines"></div>
    </div>
    <button class="memo-fab" id="memo-btn" onclick="toggleMemoMode()" title="メモ投稿">📸</button>
    <!-- 復元ボタン（localStorageが空のときのみ表示） -->
    <div id="restore-hint" style="display:none;position:absolute;bottom:70px;left:50%;transform:translateX(-50%);z-index:1000;white-space:nowrap">
      <button onclick="openRestoreModal()" style="background:rgba(242,169,0,.15);border:1.5px solid var(--gold);color:var(--gold);border-radius:12px;padding:10px 16px;font-family:'Zen Kaku Gothic New',sans-serif;font-size:13px;cursor:pointer;backdrop-filter:blur(8px)">
        📲 新端末？Notionから記録を復元
      </button>
    </div>
  </div>

<!-- 復元モーダル -->
<div class="memo-modal" id="restore-modal" onclick="if(event.target===this)closeRestoreModal()">
  <div class="memo-sheet">
    <div class="sh"></div>
    <div class="modal-title">📲 記録を復元する</div>
    <div class="modal-sub" style="color:var(--silver);font-size:12px;margin-bottom:16px;line-height:1.6">
      新しい端末では記録がリセットされます。<br>
      Claudeに「乗レコ復元データを出して」と送ると<br>
      復元用JSONが出力されます。それを下に貼り付けてください。
    </div>
    <div class="fg">
      <div class="fl">ClaudeからのJSONを貼り付け</div>
      <textarea class="mta" id="restore-json-input" style="height:140px;font-family:'DM Mono',monospace;font-size:11px" placeholder='[{"id":"trip_xxx","date":"2026-05-06",...}]'></textarea>
    </div>
    <button class="btn-gen" onclick="restoreFromJson(document.getElementById('restore-json-input').value)">
      📥 この端末に復元する
    </button>
    <div style="margin-top:12px;padding:10px;background:rgba(255,255,255,.04);border-radius:8px;font-size:11px;color:var(--silver);line-height:1.6">
      <b style="color:var(--gold)">現在の記録数：</b><span id="current-trip-count">0</span>件<br>
      <b style="color:var(--gold)">データ元：</b><span id="current-data-source">-</span>
    </div>
    <button class="btn-cls" onclick="closeRestoreModal()">閉じる</button>
  </div>
</div>
  <div class="pane" id="pane-list"><div class="pane-inner" id="list-content"></div></div>
  <div class="pane" id="pane-stats"><div class="pane-inner" id="stats-content"></div></div>
</div>

<!-- Memo Modal -->
<div class="memo-modal" id="memo-modal" onclick="if(event.target===this)closeMemo()">
  <div class="memo-sheet">
    <div class="sh"></div>
    <div class="modal-title" id="m-title">📸 メモを投稿</div>
    <div class="modal-sub" id="m-sub"></div>
    <div class="fg"><div class="fl">種別</div><div class="chip-row" id="type-row">
      <button class="chip active" data-v="駅" onclick="selChip(this,'type-row')">🚉 駅</button>
      <button class="chip" data-v="車内" onclick="selChip(this,'type-row')">🪟 車窓</button>
      <button class="chip" data-v="路線" onclick="selChip(this,'type-row')">🚃 路線</button>
      <button class="chip" data-v="その他" onclick="selChip(this,'type-row')">📍 その他</button>
    </div></div>
    <div class="fg"><div class="fl">気分</div><div class="chip-row" id="mood-row">
      <button class="chip" data-v="最高" onclick="selChip(this,'mood-row')">🤩</button>
      <button class="chip active" data-v="良い" onclick="selChip(this,'mood-row')">😊</button>
      <button class="chip" data-v="普通" onclick="selChip(this,'mood-row')">😐</button>
      <button class="chip" data-v="微妙" onclick="selChip(this,'mood-row')">😕</button>
      <button class="chip" data-v="最悪" onclick="selChip(this,'mood-row')">😤</button>
    </div></div>
    <div class="fg"><div class="fl">タグ</div><div class="chip-row">
      <button class="chip" data-tag="絶景" onclick="togTag(this)">🏔️ 絶景</button>
      <button class="chip" data-tag="食事" onclick="togTag(this)">🍱 食事</button>
      <button class="chip" data-tag="レア車両" onclick="togTag(this)">🚄 レア車両</button>
      <button class="chip" data-tag="混雑" onclick="togTag(this)">👥 混雑</button>
      <button class="chip" data-tag="終点" onclick="togTag(this)">🏁 終点</button>
      <button class="chip" data-tag="始発" onclick="togTag(this)">🌅 始発</button>
    </div></div>
    <div class="fg"><div class="fl">コメント</div><textarea class="mta" id="m-comment" placeholder="車窓の景色、駅の雰囲気、気づいたことなど..."></textarea></div>
    <div class="fg"><div class="fl">写真URL（Google Photos / iCloud など）</div><input class="pin" type="url" id="m-photo" placeholder="https://..."></div>
    <button class="btn-gen" onclick="genMemo()">📋 データを生成 → Claudeに貼り付け</button>
    <div class="out-area" id="out-area">
      <div class="out-hint">▼ 長押し → 全選択 → コピー してClaudeに貼り付け</div>
      <textarea class="out-ta" id="out-ta" readonly onclick="this.select()"></textarea>
    </div>
    <button class="btn-cls" onclick="closeMemo()">閉じる</button>
  </div>
</div>

const loadedPriorities = new Set();
const pendingLoads = new Set();

// 優先度別JSONファイル
const PRIORITY_FILES = {
  1: 'lines-p1.json',  // 新幹線・主要幹線（ズーム5〜）
  2: 'lines-p2.json',  // 主要私鉄・地下鉄（ズーム7〜）
  3: 'lines-p3.json',  // 在来線・地方線（ズーム9〜）
};

// ズームレベル→読み込む優先度の閾値
function getPriorityThreshold(zoom) {
  if (zoom >= 9) return 3;
  if (zoom >= 7) return 2;
  return 1;
}

// 路線データを非同期で読み込む
async function loadLines(priority) {
  if (loadedPriorities.has(priority)) return;
  if (pendingLoads.has(priority)) {
    // 既に読み込み中なら完了を待つ
    return new Promise(resolve => {
      const check = setInterval(() => {
        if (loadedPriorities.has(priority) || !pendingLoads.has(priority)) {
          clearInterval(check);
          resolve();
        }
      }, 100);
    });
  }
  pendingLoads.add(priority);

  const url = PRIORITY_FILES[priority];
  if (!url) { pendingLoads.delete(priority); return; }

  try {
    const resp = await fetch(url);
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const newLines = await resp.json();

    const existingIds = new Set(LINES.map(l => l.id));
    const added = newLines.filter(l => !existingIds.has(l.id));
    LINES.push(...added);

    loadedPriorities.add(priority);
    pendingLoads.delete(priority);

    console.log(`[乗レコ] P${priority}完了: +${added.length}路線（計${LINES.length}路線）`);

    rebuildRiddenStations();

    // 地図初期化済みなら追加分を描画
    if (map && dotLayerRef) {
      added.forEach(line => drawSingleLine(line));
      updateOverlays();
      updateLOD();
    }
  } catch(e) {
    pendingLoads.delete(priority);
    loadedPriorities.add(priority); // エラーでも再試行しない
    console.error(`[乗レコ] P${priority}エラー:`, e);
  }
}

// ズームに応じて必要な優先度を読み込む
async function loadLinesForZoom(zoom) {
  const maxP = getPriorityThreshold(zoom);
  for (let p = 1; p <= maxP; p++) {
    if (!loadedPriorities.has(p)) {
      loadLines(p); // 非同期で並行実行
    }
  }
}

// 乗車済みデータを再構築（路線追加後に呼ぶ）
function rebuildRiddenStations() {
  Object.keys(riddenSt).forEach(k => delete riddenSt[k]);
  RIDDEN_SEGS.forEach(seg => {
    const line = LINES.find(l => l.id === seg.lineId);
    if (!line) return;
    if (!riddenSt[seg.lineId]) riddenSt[seg.lineId] = new Set();
    const fi = line.stations.findIndex(s => s.n === seg.from);
    const ti = line.stations.findIndex(s => s.n === seg.to);
    if (fi < 0 || ti < 0) return;
    for (let i = Math.min(fi,ti); i <= Math.max(fi,ti); i++)
      riddenSt[seg.lineId].add(line.stations[i].n);
  });
}

// 新しく読み込んだ路線だけを地図に追加描画
function redrawNewLines(newLines) {
  if (!map) return;
  newLines.forEach(line => {
    drawSingleLine(line);
  });
  // LOD再適用
  if (typeof updateLOD === 'function') updateLOD();
}

function tripsToSegs(trips) {
  const segs = [];
  trips.forEach(trip => {
    (trip.segments || []).forEach(seg => {
      segs.push({ lineId: seg.lineId, from: seg.from, to: seg.to });
    });
  });
  return segs;
}

function restoreFromJson(jsonText) {
  try {
    const data = JSON.parse(jsonText);
    if (!Array.isArray(data)) throw new Error('配列形式でありません');
    const existing = JSON.parse(localStorage.getItem('norireco_trips') || '[]');
    const existingIds = new Set(existing.map(t => t.id));
    let added = 0;
    data.forEach(trip => {
      if (!existingIds.has(trip.id)) { existing.push(trip); added++; }
    });
    localStorage.setItem('norireco_trips', JSON.stringify(existing));
    alert(`✅ ${added}件復元しました`);
    closeRestoreModal();
    location.reload();
  } catch(e) {
    alert('❌ ' + e.message);
  }
}
// Mercator projection（SVGと同じ座標系）
const PAD=22;
function merc(lat,lon){
  const x=(lon+180)/360;
  const lr=lat*Math.PI/180;
  const y=(1-Math.log(Math.tan(lr)+1/Math.cos(lr))/Math.PI)/2;
  return {x,y};
}
function toSvg(lat,lon){
  const p=merc(lat,lon),p0=merc(24,122),p1=merc(46,147);
  return {
    x:PAD+(p.x-p0.x)/(p1.x-p0.x)*(SVG_W-PAD*2),
    y:PAD+(p.y-p1.y)/(p0.y-p1.y)*(SVG_H-PAD*2)
  };
}

// 乗車済み駅セット
const riddenSt={};
RIDDEN_SEGS.forEach(seg=>{
  const line=LINES.find(l=>l.id===seg.lineId);if(!line)return;
  if(!riddenSt[seg.lineId])riddenSt[seg.lineId]=new Set();
  const fi=line.stations.findIndex(s=>s.n===seg.from);
  const ti=line.stations.findIndex(s=>s.n===seg.to);
  if(fi<0||ti<0)return;
  for(let i=Math.min(fi,ti);i<=Math.max(fi,ti);i++)riddenSt[seg.lineId].add(line.stations[i].n);
});

function lStats(line){const t=line.stations.length,r=riddenSt[line.id]?riddenSt[line.id].size:0;return{t,r,pct:t>0?Math.round(r/t*100):0};}
function gStats(){let ts=0,rt=0,la=0,ld=0;LINES.forEach(l=>{const s=lStats(l);ts+=s.t;rt+=s.r;if(s.r>0)la++;if(s.pct===100)ld++;});return{ts,rt,la,ld,pct:ts>0?Math.round(rt/ts*100):0};}

  const cartoTile = L.tileLayer(
    'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{
    maxZoom:19, subdomains:'abcd',
    attribution:'© OpenStreetMap © CARTO',
  });

  let gsiErrors=0;
  gsiTile.on('tileerror',()=>{
    gsiErrors++;
    if(gsiErrors>3&&map.hasLayer(gsiTile)){
      map.removeLayer(gsiTile);
      cartoTile.addTo(map);
      const tp=document.querySelector('.leaflet-tile-pane');
      if(tp) tp.style.filter='none';
    }
  });
  gsiTile.addTo(map);

  const applyFilter=()=>{
    const tp=document.querySelector('.leaflet-tile-pane');
    if(tp&&map.hasLayer(gsiTile))
      tp.style.filter='brightness(0.65) contrast(1.15) saturate(0.55) hue-rotate(185deg)';
  };
  setTimeout(applyFilter,300);

  L.control.zoom({position:'bottomright'}).addTo(map);

  // レイヤーグループを先に作成
  dotLayerRef = L.layerGroup();
  labelLayerRef = L.layerGroup();

  // P1はHTMLに埋め込み済みなので即描画
  loadedPriorities.add(1);

  updateOverlays();
  fitToRiddenLines();

  // ストレージ状態を表示（まずlocalStorageの状態を反映）
  const stats = getStorageStats();
  updateStorageUI(stats.count, stats.source);

  // Supabaseから最新データを非同期で取得・同期（バックグラウンド）
  syncFromSupabase();

  // 復元ヒント表示
  if (stats.source === 'static') {
    const hint = document.getElementById('restore-hint');
    if (hint) hint.style.display = 'block';
  }

  // 復元モーダルの情報更新
  const tripCount = document.getElementById('current-trip-count');
  const dataSource = document.getElementById('current-data-source');
  if (tripCount) tripCount.textContent = stats.count;
  if (dataSource) dataSource.textContent = stats.source === 'local'
    ? 'このiPhoneのlocalStorage' : '静的データ（Supabaseから自動同期）';

  // P2をバックグラウンドで読み込み（UIブロックなし）
  loadLines(2);

  // ズーム変更時にP3を追加読み込み + LOD更新
  map.on('zoomend', () => {
    const z = map.getZoom();
    if (z >= 9 && !loadedPriorities.has(3) && !pendingLoads.has(3)) {
      loadLines(3);
    }
    updateLOD();
  });

  // メモモード
  map.on('click',e=>{
    if(!memoMode)return;
    let bLine=null,bSt=null,bD=Infinity;
    LINES.forEach(line=>line.stations.forEach(s=>{
      const d=map.distance([s.lat,s.lon],e.latlng);
      if(d<bD){bD=d;bLine=line;bSt=s;}
    }));
    clickInfo={line:bLine,station:bSt,lat:e.latlng.lat.toFixed(5),lon:e.latlng.lng.toFixed(5)};
    openMemo();
  });
}

// ローディングインジケーターは廃止（P1がHTMLに埋め込まれているため不要）

// 乗車済み路線のバウンディングボックスにフィット
function fitToRiddenLines(){
  const pts=[];
  LINES.forEach(line=>{
    if(!riddenSt[line.id]||riddenSt[line.id].size===0)return;
    line.stations.forEach(s=>{
      if(riddenSt[line.id].has(s.n)) pts.push([s.lat,s.lon]);
    });
  });
  if(pts.length===0){ map.setView([36.5,138.0],5); return; }
  const bounds=L.latLngBounds(pts);
  map.fitBounds(bounds,{padding:[40,40],maxZoom:9,animate:false});
}

// ══════════════════════════════════════
// Canvas renderer（原則1：DOM排除）
// ══════════════════════════════════════
const CANVAS = L.canvas({ padding: 0.5 });

// 路線の優先度（LOD用）
// 1=最高優先（新幹線・主要幹線）ズーム5〜
// 2=高優先（主要私鉄・地下鉄幹線）ズーム7〜
// 3=中優先（在来線・主要私鉄支線）ズーム8〜
// 4=低優先（ローカル線・路面電車）ズーム9〜
const LINE_PRIORITY = {
  // 新幹線
  'tokaido-shinkansen':1,'tohoku':1,'hokuriku':1,'nishi-kyushu':1,
  // JR幹線
  'tohoku-main':1,'joban':1,'chuo':1,'keihin':1,'tokaido-nagoya':1,
  'kagoshima-main':1,'kagoshima-south':1,'nippo':1,'sanin':1,
  'hakodate-main':1,'soya':1,'nemuro':1,
  // 首都圏主要私鉄
  'yamanote':1,'saikyo':1,'shonan':1,'takasaki':1,'utsunomiya':1,
  'sobu':1,'keiyo':1,'nambu':1,'yokosuka':1,
  'tokyu-toyoko':2,'keikyu':2,'odakyu':2,'keio':2,'seibu':2,
  'tobu-skytree':2,'tobu-tojo':2,'tobu-nikko':2,'tobu-isesaki':2,
  'keisei':2,
  // 地下鉄幹線
  'tokyometro-ginza':2,'tokyometro-marunouchi':2,'tokyometro-hibiya':2,
  'tokyometro-tozai':2,'tokyometro-chiyoda':2,'tokyometro-hanzomon':2,
  'tokyometro-namboku':2,'tokyometro-fukutoshin':2,
  'toei-oedo':2,'toei-shinjuku':2,'toei-asakusa':2,'toei-mita':2,
  'osaka-midosuji':2,'keihan':2,'hanshin':2,'hankyu-kobe':2,
  // JR地方幹線
  'musashino':2,'hachiko':2,'senseki':2,'ou-main':2,'rikuu-east':2,
  'chitose':2,'yosan':2,'tosa':2,'kintetsu':2,'kintetsu-kyoto':2,
  'kintetsu-nagoya':2,'jr-osaka-kobe':2,'jr-kyoto':2,
};
function getLinePriority(line){
  return LINE_PRIORITY[line.id] || (line.group==='新幹線'?1:
    line.group==='首都圏'?3:
    line.group==='関西'?3:
    line.group==='東海・中部'?3:3);
}

// ズームレベルで表示する優先度の閾値
function getVisiblePriority(zoom){
  if(zoom>=9) return 4;
  if(zoom>=8) return 3;
  if(zoom>=7) return 2;
  return 1;
}

// 全Leafletレイヤーを管理
let allLayers=[];
let dotLayerRef=null;
let labelLayerRef=null;

function drawLines(){
  // レイヤーグループ初期化（まだなければ）
  if (!dotLayerRef) {
    dotLayerRef = L.layerGroup();
    labelLayerRef = L.layerGroup();
  }

  // 読み込み済みの全路線を描画
  LINES.forEach(line => drawSingleLine(line));

  // LOD初期適用
  updateLOD();
}

// ── LOD：ズームに応じて路線・ドット・ラベルを表示/非表示 ──
function updateLOD() {
  if (!map) return;
  const z = map.getZoom();
  const maxP = getVisiblePriority(z);

  // 路線ラインのLOD
  allLayers.forEach(layer => {
    const p = layer._norireco_priority || 3;
    if (p <= maxP) {
      if (!map.hasLayer(layer)) map.addLayer(layer);
    } else {
      if (map.hasLayer(layer)) map.removeLayer(layer);
    }
  });

  // ドット：ズーム9以上
  if (dotLayerRef) {
    if (z >= 9) map.addLayer(dotLayerRef);
    else map.removeLayer(dotLayerRef);
  }

  // ラベル：ズーム11以上
  if (labelLayerRef) {
    if (z >= 11) map.addLayer(labelLayerRef);
    else map.removeLayer(labelLayerRef);
  }
}

// 1路線を描画（遅延読み込み時にも呼ばれる）
function drawSingleLine(line){
  const canvas=CANVAS;
  const dotLayer=dotLayerRef;
  const labelLayer=labelLayerRef;
  if(!dotLayer||!labelLayer)return;

  const rd=riddenSt[line.id];
  const allLatLng=line.stations.map(s=>[s.lat,s.lon]);
  const stats=lStats(line);
  const priority=getLinePriority(line);
  const isRidden=rd&&rd.size>0;

  if(!isRidden){
    // 未乗車：Canvasで描画
    const glowLine=L.polyline(allLatLng,{
      color:line.color, weight:5, opacity:0.08,
      lineCap:'round', renderer:canvas,
    });
    const mainLine=L.polyline(allLatLng,{
      color:line.color, weight:2.5, opacity:0.55,
      dashArray:'6 5', lineCap:'round', renderer:canvas,
    }).bindTooltip(
      `<b style="color:${line.color}">${line.name}</b><br><span style="color:rgba(140,160,179,.7)">${line.region} · 未乗車 ${stats.t}駅</span>`,
      {className:'norireco-tooltip',sticky:true,offset:[10,0]}
    );

    glowLine._norireco_priority=priority;
    mainLine._norireco_priority=priority;
    allLayers.push(glowLine, mainLine);

    // 現在のズームで表示すべきか判定してから追加
    const z = map ? map.getZoom() : 5;
    if (priority <= getVisiblePriority(z)) {
      glowLine.addTo(map);
      mainLine.addTo(map);
    }

    // 未乗車駅ドット
    line.stations.forEach(s=>{
      const dot=L.circleMarker([s.lat,s.lon],{
        radius:2.5, fillColor:line.color,
        color:'rgba(255,255,255,0.4)', weight:0.8,
        fillOpacity:0.4, renderer:canvas,
      }).bindTooltip(
        `<b style="color:${line.color}">${s.n}</b><br><span style="color:rgba(140,160,179,.7)">${line.name} · 未乗車</span>`,
        {className:'norireco-tooltip',offset:[8,0]}
      );
      dot._norireco_priority=priority;
      dotLayer.addLayer(dot);

      const label=L.marker([s.lat,s.lon],{
        icon:L.divIcon({
          className:'',
          html:`<div style="font-family:'Zen Kaku Gothic New',sans-serif;font-size:9px;font-weight:400;color:rgba(255,255,255,0.6);text-shadow:0 0 4px rgba(0,0,0,1);white-space:nowrap;pointer-events:none;padding-left:6px;margin-top:-5px">${s.n}</div>`,
          iconSize:[0,0],iconAnchor:[0,0],
        }),interactive:false,
      });
      label._norireco_priority=priority;
      labelLayer.addLayer(label);
    });
    return;
  }

  // 乗車済み
  L.polyline(allLatLng,{
    color:line.color+'28',weight:1.5,lineCap:'round',renderer:canvas
  }).addTo(map);

  let ss=null;
  line.stations.forEach((s,i)=>{
    const ir=rd.has(s.n);
    if(ir&&ss===null) ss=i;
    if(!ir&&ss!==null){drawRiddenSeg(line,ss,i-1,canvas);ss=null;}
    if(i===line.stations.length-1&&ss!==null)drawRiddenSeg(line,ss,i,canvas);
  });

  L.polyline(allLatLng,{color:'transparent',weight:20,lineCap:'round'})
    .addTo(map)
    .bindTooltip(
      `<b style="color:${line.color}">${line.name}</b><br><span style="color:rgba(140,160,179,.8)">${line.region}</span><br><span style="color:rgba(242,169,0,.9);font-family:monospace">${stats.r}/${stats.t}駅 — ${stats.pct}%</span>`,
      {className:'norireco-tooltip',sticky:true,offset:[12,0]}
    )
    .on('click',e=>{
      if(!memoMode)return;
      let bSt=null,bD=Infinity;
      line.stations.forEach(s=>{
        const d=map.distance([s.lat,s.lon],e.latlng);
        if(d<bD){bD=d;bSt=s;}
      });
      clickInfo={line,station:bSt,lat:e.latlng.lat.toFixed(5),lon:e.latlng.lng.toFixed(5)};
      openMemo();
    });

  line.stations.forEach(s=>{
    if(!rd.has(s.n))return;
    const dot=L.circleMarker([s.lat,s.lon],{
      radius:4,fillColor:line.color,
      color:'rgba(255,255,255,0.85)',weight:1.2,fillOpacity:1,
      renderer:canvas,
    }).bindTooltip(`<b>${s.n}</b><br><span style="color:rgba(140,160,179,.8)">${line.name}</span>`,
      {className:'norireco-tooltip',offset:[8,0]});
    dotLayer.addLayer(dot);

    const label=L.marker([s.lat,s.lon],{
      icon:L.divIcon({
        className:'',
        html:`<div style="font-family:'Zen Kaku Gothic New',sans-serif;font-size:10px;font-weight:700;color:#fff;text-shadow:0 0 4px rgba(0,0,0,1),0 0 8px rgba(0,0,0,1);white-space:nowrap;pointer-events:none;padding-left:7px;margin-top:-6px">${s.n}</div>`,
        iconSize:[0,0],iconAnchor:[0,0],
      }),interactive:false,
    });
    labelLayer.addLayer(label);
  });
}


function drawRiddenSeg(line,from,to,canvas){
  const latlngs=line.stations.slice(from,to+1).map(s=>[s.lat,s.lon]);
  L.polyline(latlngs,{color:line.color,weight:10,opacity:0.12,lineCap:'round',lineJoin:'round',renderer:canvas}).addTo(map);
  L.polyline(latlngs,{color:line.color,weight:3.5,opacity:0.95,lineCap:'round',lineJoin:'round',renderer:canvas}).addTo(map);
  L.polyline(latlngs,{color:'rgba(255,255,255,0.4)',weight:0.8,lineCap:'round',renderer:canvas}).addTo(map);
}

function closeMemo(){document.getElementById('memo-modal').classList.remove('open');}
function selChip(btn,rowId){document.querySelectorAll(`#${rowId} .chip`).forEach(b=>b.classList.remove('active'));btn.classList.add('active');}
function togTag(btn){btn.classList.toggle('tag-on');btn.classList.toggle('active',btn.classList.contains('tag-on'));}
function genMemo(){
  const type=document.querySelector('#type-row .chip.active')?.dataset.v||'駅';
  const mood=document.querySelector('#mood-row .chip.active')?.dataset.v||'良い';
  const tags=[...document.querySelectorAll('.chip[data-tag].tag-on')].map(b=>b.dataset.tag);
  const comment=document.getElementById('m-comment').value.trim();

    種別:type,コメント:comment,写真URL:photo,
    日付:new Date().toISOString().split('T')[0],
    気分:mood,タグ:tags.join('、'),緯度:clickInfo.lat||'',経度:clickInfo.lon||''};
  const text=`📸駅メモデータ\n${JSON.stringify(payload)}\nこのデータをNotionの「駅メモ」DBに保存してください。`;
  const ta=document.getElementById('out-ta');
  ta.value=text;document.getElementById('out-area').style.display='block';ta.select();
}

function renderStats(){
  const c=document.getElementById('stats-content');c.innerHTML='';
  const gs=gStats();

  // ── 乗りつぶし進捗 ──
  const g=document.createElement('div');g.className='stat-grid';
  g.innerHTML=`
    <div class="scard"><div class="sc-l">全体達成率</div><div class="sc-v">${gs.pct}<span class="sc-u">%</span></div><div class="sc-s">${gs.rt}/${gs.ts}駅</div></div>
    <div class="scard"><div class="sc-l">乗車路線数</div><div class="sc-v">${gs.la}<span class="sc-u">/${LINES.length}</span></div><div class="sc-s">完乗: ${gs.ld}路線</div></div>
  `;
  c.appendChild(g);

  // ── Supabaseからの旅程統計（非同期） ──
  const tripSection = document.createElement('div');
  tripSection.innerHTML = `<div class="sec-lbl">旅程統計 <span style="font-size:9px;color:var(--silver)">☁️ Supabase</span></div>
    <div class="stat-grid" id="trip-stat-grid">
      <div class="scard"><div class="sc-l">読み込み中...</div><div class="sc-v" style="font-size:14px">...</div></div>
    </div>`;
  c.appendChild(tripSection);

  // Supabaseから統計を非同期取得
  fetch(`${SUPABASE_URL}/rest/v1/norireco_trips?select=*`, {
    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
  }).then(r => r.json()).then(trips => {
    const totalTrips = trips.length;
    const totalStations = trips.reduce((s,t) => s + (t.total_stations||0), 0);
    const totalTransfers = trips.reduce((s,t) => s + (t.transfers||0), 0);
    const totalMinutes = trips.reduce((s,t) => s + (t.total_minutes||0), 0);

    // 月別集計
    const byMonth = {};
    trips.forEach(t => {
      const m = (t.date||'').slice(0,7);
      if (!m) return;
      if (!byMonth[m]) byMonth[m] = { trips:0, stations:0 };
      byMonth[m].trips++;
      byMonth[m].stations += t.total_stations||0;
    });

    const grid = document.getElementById('trip-stat-grid');
    if (!grid) return;
    grid.innerHTML = `
      <div class="scard"><div class="sc-l">総旅程数</div><div class="sc-v">${totalTrips}<span class="sc-u">回</span></div></div>
      <div class="scard"><div class="sc-l">総乗車駅数</div><div class="sc-v">${totalStations}<span class="sc-u">駅</span></div></div>
      <div class="scard"><div class="sc-l">総乗換回数</div><div class="sc-v">${totalTransfers}<span class="sc-u">回</span></div></div>
      <div class="scard"><div class="sc-l">総乗車時間</div><div class="sc-v">${Math.floor(totalMinutes/60)}<span class="sc-u">時間</span>${totalMinutes%60}<span class="sc-u">分</span></div></div>
    `;

    // 月別グラフ
    if (Object.keys(byMonth).length > 0) {
      const ch = document.createElement('div'); ch.className='bc';
      ch.innerHTML = '<div class="bc-t">月別 旅程数</div>';
      const maxT = Math.max(...Object.values(byMonth).map(v=>v.trips));
      Object.entries(byMonth).sort().forEach(([m,v]) => {
        const row = document.createElement('div'); row.className='bc-r';
        row.innerHTML = `<div class="bc-l">${m}</div><div class="bc-bg"><div class="bc-fill" style="width:${Math.round(v.trips/maxT*100)}%;background:var(--red)"></div></div><div class="bc-n">${v.trips}回</div>`;
        ch.appendChild(row);
      });
      tripSection.appendChild(ch);
    }

    // 直近の旅程
    if (trips.length > 0) {
      const recent = document.createElement('div'); recent.className='bc';
      recent.innerHTML = '<div class="bc-t">直近の旅程</div>';
      [...trips].reverse().slice(0,5).forEach(t => {
        const row = document.createElement('div'); row.className='bc-r';
        row.innerHTML = `<div class="bc-l" style="width:140px">${t.name||''}</div><div style="flex:1;font-size:10px;color:var(--silver)">${t.date||''}</div><div class="bc-n" style="color:var(--silver)">${t.total_stations||0}駅</div>`;
        recent.appendChild(row);
      });
      tripSection.appendChild(recent);
    }
  }).catch(e => {
    const grid = document.getElementById('trip-stat-grid');
    if (grid) grid.innerHTML = `<div class="scard"><div class="sc-l">取得失敗</div><div class="sc-v" style="font-size:12px;color:var(--silver)">localStorageを使用中</div></div>`;
  });

  // ── 路線別達成率 ──
  const rLines=LINES.filter(l=>lStats(l).r>0).sort((a,b)=>lStats(b).pct-lStats(a).pct);
  if(rLines.length){
    const ch=document.createElement('div');ch.className='bc';
    ch.innerHTML='<div class="bc-t">路線別 達成率</div>';
    rLines.forEach(line=>{const s=lStats(line);const row=document.createElement('div');row.className='bc-r';row.innerHTML=`<div class="bc-l">${line.name}</div><div class="bc-bg"><div class="bc-fill" style="width:${s.pct}%;background:${line.color}"></div></div><div class="bc-n">${s.pct}%</div>`;ch.appendChild(row);});
    c.appendChild(ch);
  }

  // ── 実績 ──
  const at=document.createElement('div');at.className='sec-lbl';at.textContent='実績';c.appendChild(at);
  const achs=[
    {ic:'🚃',nm:'乗り鉄デビュー',ds:'初めての旅程を記録',on:gs.rt>=1},
    {ic:'🔀',nm:'乗換マスター',ds:'乗換を含む旅程を記録',on:RIDDEN_SEGS.length>=2},
    {ic:'🗾',nm:'2路線制覇',ds:'2路線以上に乗車',on:gs.la>=2},
    {ic:'🚄',nm:'新幹線デビュー',ds:'新幹線に初乗車',on:!!riddenSt['tokaido-shinkansen']||!!riddenSt['tohoku']||!!riddenSt['hokuriku']},
    {ic:'⚡',nm:'東海道新幹線完乗',ds:'東京〜博多を全駅乗車',on:lStats(LINES.find(l=>l.id==='tokaido-shinkansen')||{stations:[]}).pct===100},
    {ic:'🌐',nm:'3路線制覇',ds:'3路線以上に乗車',on:gs.la>=3},
    {ic:'🏅',nm:'5路線制覇',ds:'5路線以上に乗車',on:gs.la>=5},
    {ic:'🏆',nm:'乗りつぶし50%',ds:'全路線の50%達成',on:gs.pct>=50},
    {ic:'👑',nm:'完全乗りつぶし',ds:'全路線・全駅に乗車',on:gs.pct===100},
  ];
  const al=document.createElement('div');al.className='ach-list';
  achs.forEach(a=>{const el=document.createElement('div');el.className='ach'+(a.on?' on':'');el.innerHTML=`<div class="ach-ic">${a.ic}</div><div><div class="ach-nm">${a.nm}</div><div class="ach-ds">${a.ds}</div></div>${a.on?'<div class="ach-bj">UNLOCKED</div>':''}`;al.appendChild(el);});
  c.appendChild(al);
}

window.addEventListener('load',()=>{
  initMap();
  if('serviceWorker'in navigator)navigator.serviceWorker.register('./sw.js').catch(()=>{});
});
